<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamali4U — TikTok Video Downloader</title>
<style>
  :root{
    --ink:#111318;
    --paper:#f7f5f0;
    --accent:#ff2e63;
    --accent2:#08d9d6;
    --muted:#6b6f76;
    --card:#ffffff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  header{
    width:100%;
    padding:2.5rem 1.5rem 1rem;
    text-align:center;
  }
  .logo{
    display:inline-flex;
    align-items:center;
    gap:.5rem;
    font-weight:800;
    font-size:1.4rem;
    letter-spacing:-0.02em;
  }
  .logo span.dot{
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:inline-block;
  }
  h1{
    font-size:clamp(1.8rem, 5vw, 2.8rem);
    margin-top:1rem;
    font-weight:800;
    letter-spacing:-0.03em;
  }
  h1 em{
    font-style:normal;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p.sub{
    color:var(--muted);
    margin-top:.6rem;
    font-size:1.05rem;
  }
  main{
    width:100%;
    max-width:640px;
    padding:2rem 1.5rem;
  }
  .search-box{
    background:var(--card);
    border-radius:18px;
    padding:1.25rem;
    box-shadow:0 10px 30px rgba(0,0,0,0.06);
    display:flex;
    gap:.6rem;
    border:1px solid #eee;
  }
  .search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:1rem;
    padding:.6rem;
    background:transparent;
  }
  .search-box button{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:.7rem 1.4rem;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .search-box button:hover{
    background:var(--accent);
    transform:translateY(-1px);
  }
  .search-box button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
  }
  #status{
    margin-top:1rem;
    text-align:center;
    color:var(--muted);
    min-height:1.4rem;
    font-size:.95rem;
  }
  #result{
    margin-top:1.5rem;
    display:none;
    background:var(--card);
    border-radius:18px;
    padding:1.5rem;
    border:1px solid #eee;
    text-align:center;
  }
  #result video{
    width:100%;
    max-width:280px;
    border-radius:14px;
    margin-bottom:1rem;
  }
  #result h3{
    font-size:1.05rem;
    margin-bottom:1rem;
    color:var(--ink);
  }
  .dl-links{
    display:flex;
    flex-direction:column;
    gap:.6rem;
  }
  .dl-links a{
    display:block;
    text-decoration:none;
    padding:.8rem;
    border-radius:12px;
    font-weight:700;
    font-size:.95rem;
  }
  .dl-links a.primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
  }
  .dl-links a.secondary{
    background:#f1f1f1;
    color:var(--ink);
  }
  footer{
    margin-top:auto;
    padding:2rem;
    color:var(--muted);
    font-size:.85rem;
    text-align:center;
  }
  .steps{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1rem;
    margin-top:2.5rem;
    text-align:center;
  }
  .steps div{
    font-size:.85rem;
    color:var(--muted);
  }
  .steps b{
    display:block;
    font-size:1.4rem;
    color:var(--ink);
    margin-bottom:.3rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="dot"></span> Jamali4U</div>
  <h1>Save any TikTok, <em>watermark-free</em></h1>
  <p class="sub">Paste the video link below — get an instant download.</p>
</header>

<main>
  <div class="search-box">
    <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/...">
    <button id="downloadBtn">Get Video</button>
  </div>
  <div id="status"></div>

  <div id="result">
    <video id="previewVideo" controls></video>
    <h3 id="videoTitle"></h3>
    <div class="dl-links">
      <a id="noWatermarkLink" class="primary" target="_blank">⬇ Download (No Watermark)</a>
      <a id="watermarkLink" class="secondary" target="_blank">⬇ Download (With Watermark)</a>
    </div>
  </div>

  <div class="steps">
    <div><b>1</b>Paste link</div>
    <div><b>2</b>Click Get Video</div>
    <div><b>3</b>Download & save</div>
  </div>
</main>

<footer>
  Built for personal use only. Please respect creators' rights.
</footer>

<script>
  // ⚠️ IMPORTANT: Apni RapidAPI key yahan daalo
  const RAPIDAPI_KEY = "f92f85abf4msh190e0731f77fd16p19fab7jsn19299df9bc97";
  const RAPIDAPI_HOST = "tiktok-video-no-watermark2.p.rapidapi.com";

  const urlInput = document.getElementById('urlInput');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusEl = document.getElementById('status');
  const result = document.getElementById('result');
  const previewVideo = document.getElementById('previewVideo');
  const videoTitle = document.getElementById('videoTitle');
  const noWatermarkLink = document.getElementById('noWatermarkLink');
  const watermarkLink = document.getElementById('watermarkLink');

  downloadBtn.addEventListener('click', fetchVideo);
  urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') fetchVideo();
  });

  async function fetchVideo(){
    const tiktokUrl = urlInput.value.trim();

    if(!tiktokUrl){
      statusEl.textContent = "Pehle ek TikTok link paste karo.";
      return;
    }
    if(!tiktokUrl.includes("tiktok.com")){
      statusEl.textContent = "Ye valid TikTok link nahi lag raha.";
      return;
    }
    if(RAPIDAPI_KEY === "YOUR_RAPIDAPI_KEY_HERE"){
      statusEl.textContent = "Pehle apni RapidAPI key code mein daalo (line: RAPIDAPI_KEY).";
      return;
    }

    downloadBtn.disabled = true;
    downloadBtn.textContent = "Loading...";
    statusEl.textContent = "Video fetch ho raha hai...";
    result.style.display = "none";

    try{
      const apiUrl = `https://${RAPIDAPI_HOST}/?url=${encodeURIComponent(tiktokUrl)}&hd=1`;
      const response = await fetch(apiUrl, {
        method: 'GET',
        headers: {
          'X-RapidAPI-Key': RAPIDAPI_KEY,
          'X-RapidAPI-Host': RAPIDAPI_HOST
        }
      });

      if(!response.ok){
        throw new Error("API request failed: " + response.status);
      }

      const data = await response.json();

      if(!data || !data.data){
        throw new Error("Video data nahi mila. Link check karo.");
      }

      const videoData = data.data;
      const noWmUrl = videoData.play || videoData.hdplay;
      const wmUrl = videoData.wmplay;
      const title = videoData.title || "TikTok Video";

      previewVideo.src = noWmUrl;
      videoTitle.textContent = title;
      noWatermarkLink.href = noWmUrl;
      watermarkLink.href = wmUrl || noWmUrl;

      result.style.display = "block";
      statusEl.textContent = "";

    }catch(err){
      console.error(err);
      statusEl.textContent = "Kuch galat ho gaya: " + err.message;
    }finally{
      downloadBtn.disabled = false;
      downloadBtn.textContent = "Get Video";
    }
  }
</script>

</body>
</html>
